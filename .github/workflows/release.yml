name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: tls104_master_win-macos
            cmake_gen: "Unix Makefiles"
          - os: windows-latest
            artifact_name: tls104_master_win-windows
            cmake_gen: "Visual Studio 17 2022"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -G "${{ matrix.cmake_gen }}" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      - name: Package
        run: |
          cd build
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            mkdir -p dist
            cp tls104_master_win dist/
            cp -r ../certs dist/
            tar -czf ../${{ matrix.artifact_name }}.tar.gz -C dist .
          else
            mkdir -p dist
            find . -name "*.exe" -path "*/Release/*" -exec cp {} dist/ \; 2>/dev/null || true
            if ls dist/*.exe 1> /dev/null 2>&1; then
              cp -r ../certs dist/ 2>/dev/null || true
              powershell -Command "Compress-Archive -Path 'dist\\*' -DestinationPath '..\\${{ matrix.artifact_name }}.zip' -Force"
            else
              echo "No exe found, checking build output..."
              find . -name "*.exe" -o -name "tls104_master_win*" 2>/dev/null
            fi
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.*
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            tls104_master_win-macos.tar.gz
            tls104_master_win-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
