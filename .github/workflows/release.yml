name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      - name: Package
        run: |
          cd build
          mkdir -p dist
          cp tls104_master_win dist/
          cp -r ../certs dist/
          tar -czf ../tls104_master_win-macos.tar.gz -C dist .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tls104_master_win-macos
          path: tls104_master_win-macos.tar.gz
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: |
          cmake --build build --config Release --parallel

      - name: Package
        shell: bash
        run: |
          cd build
          mkdir -p dist
          cp build/Release/tls104_master_win.exe dist/ 2>/dev/null || cp build/tls104_master_win.exe dist/ 2>/dev/null || true
          ls -la dist/ || dir dist/
          cp -r ../certs dist/ 2>/dev/null || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tls104_master_win-windows
          path: |
            build/dist/tls104_master_win.exe
            build/dist/certs/*
          retention-days: 5

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            tls104_master_win-macos.tar.gz
            tls104_master_win-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
