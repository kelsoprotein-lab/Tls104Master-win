name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      - name: Package
        run: |
          cd build
          mkdir -p dist
          cp tls104_master_win dist/
          cp -r ../certs dist/
          file dist/tls104_master_win
          tar -czf ../tls104_master_win-${GITHUB_REF_NAME}-macos-universal.tar.gz -C dist .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: tls104_master_win-${{ github.ref_name }}-macos-universal.tar.gz
          retention-days: 5

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      - name: Package
        run: |
          cd build
          mkdir -p dist
          cp tls104_master_win dist/
          cp -r ../certs dist/
          tar -czf ../tls104_master_win-${GITHUB_REF_NAME}-linux-amd64.tar.gz -C dist .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: tls104_master_win-${{ github.ref_name }}-linux-amd64.tar.gz
          retention-days: 5

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      - name: Package
        run: |
          cd build
          mkdir -p dist
          cp tls104_master_win dist/
          cp -r ../certs dist/
          tar -czf ../tls104_master_win-${GITHUB_REF_NAME}-linux-arm64.tar.gz -C dist .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: tls104_master_win-${{ github.ref_name }}-linux-arm64.tar.gz
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: |
          cmake --build build --config Release --parallel
          ls -la build/Release/ 2>/dev/null || dir build\\Release

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/tls104_master_win.exe dist/ 2>/dev/null || echo "Exe not found"
          cp -r certs dist/ 2>/dev/null || echo "certs not copied"
          cd dist
          powershell -Command "Compress-Archive -Path '*' -DestinationPath '../tls104_master_win-${GITHUB_REF_NAME}-windows-x64.zip' -Force"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: tls104_master_win-${{ github.ref_name }}-windows-x64.zip
          retention-days: 5

  release:
    needs: [build-macos, build-linux-amd64, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List Artifacts
        run: |
          ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/tls104_master_win-${{ github.ref_name }}-macos-universal.tar.gz
            artifacts/tls104_master_win-${{ github.ref_name }}-linux-amd64.tar.gz
            artifacts/tls104_master_win-${{ github.ref_name }}-linux-arm64.tar.gz
            artifacts/tls104_master_win-${{ github.ref_name }}-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
